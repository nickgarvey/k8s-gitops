# Idempotent schema bootstrap. Runs once after ClickHouse is up,
# applies CREATE DATABASE/TABLE IF NOT EXISTS. Safe to re-run.
# Rolling this Job (delete & re-apply) is the recommended way to apply
# schema migrations in the future.
apiVersion: batch/v1
kind: Job
metadata:
  name: clickhouse-schema-init
  namespace: clickhouse
  labels:
    app.kubernetes.io/managed-by: ngarvey-homelab
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/managed-by: ngarvey-homelab
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: clickhouse/clickhouse-server:24.8
          command:
            - /bin/bash
            - -ec
            - |
              until clickhouse-client \
                  --host clickhouse.clickhouse.svc --port 9000 \
                  --user default --password "$CLICKHOUSE_PASSWORD" \
                  --query "SELECT 1" >/dev/null 2>&1; do
                echo "waiting for clickhouse…"
                sleep 3
              done
              clickhouse-client \
                  --host clickhouse.clickhouse.svc --port 9000 \
                  --user default --password "$CLICKHOUSE_PASSWORD" \
                  --multiquery --queries-file=/ddl/schema.sql
              echo "schema applied."
          env:
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clickhouse-default-password
                  key: password
          volumeMounts:
            - name: ddl
              mountPath: /ddl
              readOnly: true
      volumes:
        - name: ddl
          configMap:
            name: clickhouse-schema
