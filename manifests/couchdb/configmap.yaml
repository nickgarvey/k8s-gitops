apiVersion: v1
kind: ConfigMap
metadata:
  name: couchdb-config
  namespace: couchdb
  labels:
    app.kubernetes.io/managed-by: ngarvey-homelab
data:
  # Mounted at /opt/couchdb/etc/local.d/10-livesync.ini, layered over the
  # image's defaults and the auto-generated admin entry written by the
  # entrypoint from COUCHDB_USER / COUCHDB_PASSWORD.
  #
  # Values are the Self-hosted LiveSync recommended set
  # (obsidian-livesync/docs/setup_own_server*.md). single_node=true makes
  # CouchDB auto-create _users / _replicator / _global_changes on first boot.
  10-livesync.ini: |
    [couchdb]
    single_node = true
    max_document_size = 50000000

    ; Single-node sharding so auto-created system DBs (_users, _replicator,
    ; _global_changes) don't fail with "Request to create N=3 DB but only
    ; 1 node(s)" on first boot.
    [cluster]
    n = 1
    q = 1

    [chttpd]
    require_valid_user = true
    ; Let kubelet's readiness/liveness probes hit /_up without auth.
    require_valid_user_except_for_up = true
    max_http_request_size = 4294967296
    ; Bind to IPv6 wildcard; on Linux this also accepts IPv4 connections
    ; via dual-stack sockets. The cluster is IPv6-first (Cilium) so the
    ; kubelet readiness probe targets the pod's v6 address.
    bind_address = ::

    [chttpd_auth]
    require_valid_user = true
    authentication_redirect = /_utils/session.html

    [httpd]
    WWW-Authenticate = Basic realm="couchdb"
    enable_cors = true

    [cors]
    origins = app://obsidian.md,capacitor://localhost,http://localhost
    credentials = true
    headers = accept, authorization, content-type, origin, referer
    methods = GET, PUT, POST, HEAD, DELETE
    max_age = 3600

    [log]
    level = info
    writer = stderr
