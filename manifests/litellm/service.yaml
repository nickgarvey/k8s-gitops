apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: litellm
  labels:
    app.kubernetes.io/managed-by: ngarvey-homelab
  annotations:
    io.cilium/lb-ipam-ips: "2001:470:482f:2::4000"
spec:
  ipFamilies: [IPv6]
  ipFamilyPolicy: SingleStack
  selector:
    app: litellm
  type: LoadBalancer
  ports:
    - name: http
      protocol: TCP
      port: 4000
      targetPort: 4000
