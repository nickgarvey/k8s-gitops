apiVersion: apps/v1
kind: Deployment
metadata:
  name: playwright-renderer
  namespace: playwright-renderer
  labels:
    app.kubernetes.io/managed-by: ngarvey-homelab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: playwright-renderer
  template:
    metadata:
      labels:
        app: playwright-renderer
        app.kubernetes.io/managed-by: ngarvey-homelab
    spec:
      containers:
        - name: playwright-renderer
          image: zot.home.arpa:5000/playwright-renderer:latest
          ports:
            - containerPort: 3000
              name: http
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
